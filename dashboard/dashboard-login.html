<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Admin Login</title>
  <link rel="stylesheet" href="/plugins/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/plugins/icofont/icofont.min.css">
  <link rel="stylesheet" href="/dashboard/css/dashboard.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1 class="login-title">Hospital Admin Login</h1>
    <p class="login-subtitle">Sign in to access appointments and contact management.</p>

    <div class="alert-area">
      <div id="loginAlert" class="alert d-none" role="alert"></div>
    </div>

    <form id="dashboardLoginForm">
      <div class="form-group mb-3">
        <label class="mb-1" for="loginUsername">Username</label>
        <input id="loginUsername" type="text" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="form-group mb-3">
        <label class="mb-1" for="loginPassword">Password</label>
        <input id="loginPassword" type="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login to Dashboard</button>
    </form>

    <div id="demoCredentials" class="credentials-box"></div>

    <div class="text-center mt-3">
      <a href="/index.html">Back to Website</a>
    </div>
  </div>

  <script src="/dashboard/js/dashboard-auth.js"></script>
  <script src="/dashboard/js/dashboard-login.js"></script>
</body>
</html>
